    <style>
        /* ========= 乐英版本 ========= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 0.5px solid rgba(255, 255, 255, 0.6);
        }

        header {
            padding: 24px 36px;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(60, 60, 67, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1d1c1f;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            font-weight: 400;
            color: #6c6c70;
            margin-left: 2px;
        }

        .lang-switch {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 4px;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .lang-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            background: transparent;
            color: #6c6c70;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .lang-btn.active {
            background: #007aff;
            color: white;
            box-shadow: 0 2px 6px rgba(0, 122, 255, 0.3);
        }

        .lang-btn:hover:not(.active) {
            background: rgba(0, 0, 0, 0.05);
        }

        .controls {
            padding: 14px 36px;

            align-items: center;
        }

        button {
            padding: 8px 18px;

            border-radius: 40px;

            font-weight: 500;
            background: rgba(255, 255, 255, 0.8);
            color: #1d1c1f;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transform: scale(1.02);
        }

        button:active {
            background: rgba(230, 230, 235, 0.9);
            transform: scale(0.98);
        }

        .convert-btn {
            background: #007aff;
            color: white;
            border: none;
        }

        .convert-btn:hover {
            background: #0063d9;
        }

        .copy-btn {
            background: #e9e9ed;
        }

        .clear-btn {
            background: #e9e9ed;
        }

        /* 左右面板：左侧1/3，右侧2/3 */
        .editor-container {
            display: flex;
            flex-wrap: wrap;
            min-height: 600px;
            background: rgba(255, 255, 255, 0.2);
        }

        .editor-panel {

            font-weight: 600;
            margin: 0 0 12pt 0;
            color: #000;

            border-radius: 6px;

        #preview pre {
            background: #f8f9fc;
            border: none;
            border-radius: 12px;
            padding: 16px;
            overflow-x: auto;
            margin: 12pt 0;
        }

        #preview blockquote {
            border-left: 4px solid #007aff;
            padding-left: 16px;
            margin: 8pt 0;
            color: #3a3a3c;
            background: rgba(0, 122, 255, 0.03);
            border-radius: 0 8px 8px 0;

        #preview ul {
            list-style: none;
            padding-left: 1.8em;
            margin: 4pt 0 8pt 0;
        }

        #preview li {
            position: relative;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            text-indent: 0;
        }

        #preview ul>li::before {
            content: "•";
            position: absolute;
            left: -1.2em;
            top: 0;
            line-height: inherit;
            font-size: 1.3em;
            color: inherit;
            transform: translateY(0);
        }

        /* 有序列表 */
        #preview ol {
            padding-left: 2em;
            margin: 4pt 0 8pt 0;

        #preview ol>li::marker {
            font-weight: normal;
            color: inherit;
            font-size: 1.1em;
        }

        #preview li>ul,

            margin-bottom: 2pt;
            padding-left: 1.5em;

        #preview hr {

            border-top: 1px solid rgba(60, 60, 67, 0.1);

        /* 表格基础样式 */

            opacity: 0;

            z-index: 1000;
            font-weight: 500;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .notification.error {
            background: #ff3b30d9;
            color: white;
        }

            }

            .editor-panel {
                border-right: none;
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            }
        }

        // 当前语言
        let currentLang = 'zh';

        // ------------------- 语言切换功能 -------------------
        function setLanguage(lang) {
            if (!i18n[lang]) return;
            currentLang = lang;
            localStorage.setItem('markdown2docx_lang', lang);

            // 更新语言切换按钮样式
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            // 更新所有带 data-key 的元素
            document.querySelectorAll('.i18n[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });

            // 更新副标题
            document.getElementById('subtitle').textContent = i18n[lang].subtitle;

            // 更新 textarea 的 placeholder
            const textarea = document.getElementById('markdownInput');
            textarea.placeholder = i18n[lang].editorTitle.replace('📘 ', '');

            // 更新预览占位符（如果预览区仍显示占位内容）
            const preview = document.getElementById('preview');
            if (preview.innerHTML.trim() === i18n[getOtherLang(lang)].previewPlaceholder ||
                preview.innerHTML.includes('转换结果将显示在这里') ||
                preview.innerHTML.includes('Conversion results will appear here')) {
                preview.innerHTML = `<p>${i18n[lang].previewPlaceholder}</p>`;
            }

            // 如果 textarea 的内容是旧语言的默认示例，则替换为新语言的默认示例
            const oldDefault = i18n[getOtherLang(lang)].defaultMarkdown;
            const newDefault = i18n[lang].defaultMarkdown;
            if (textarea.value === oldDefault || textarea.value === '' || textarea.value === i18n[lang].defaultMarkdown) {
                textarea.value = newDefault;
                // 自动转换一次
                convertMarkdown();
            } else {
                // 用户自定义内容，只重新渲染预览以保证语言一致性
                if (textarea.value.trim()) {
                    convertMarkdown();
                }
            }

            // 更新页面标题
            document.title = lang === 'zh' ? 'Markdown转Word · 乐英版 · 完美垂直对齐' : 'Markdown to Word · Leying Edition · Perfect Vertical Alignment';
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        }

        function getOtherLang(lang) {
            return lang === 'zh' ? 'en' : 'zh';
        }

        // 初始化语言按钮事件
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setLanguage(btn.dataset.lang);
            });
        });

        // ----------------------------------- 通知 -----------------------------------
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification';
            notification.classList.add(type === 'error' ? 'error' : 'show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // ----------------------------------- 统计 -----------------------------------
        function updateStats() {
            const textarea = document.getElementById('markdownInput');
            const text = textarea.value;
            document.getElementById('charCount').textContent = text.length;
            document.getElementById('lineCount').textContent = text.split('\n').length;
            const tableMatches = text.match(/\|.*\|/g) || [];
            const tableCount = tableMatches.length > 2 ? Math.ceil(tableMatches.filter(line => line.includes(
                '|') && !line.includes('```')).length / 3) : 0;
            document.getElementById('tableCount').textContent = tableCount;
        }

        // ------------------- 表格解析函数 -------------------
        function parseTableRow(row) {
            let cleanRow = row.trim();
            if (cleanRow.startsWith('|')) cleanRow = cleanRow.substring(1);
            if (cleanRow.endsWith('|')) cleanRow = cleanRow.substring(0, cleanRow.length - 1);
            const cells = [];
            let currentCell = '',
                inCode = false;
            for (let i = 0; i < cleanRow.length; i++) {
                const char = cleanRow[i];
                if (char === '`') { inCode = !inCode;
                    currentCell += char; } else if (char === '|' && !inCode) { cells.push(currentCell.trim());
                    currentCell = ''; } else { currentCell += char; }
            }
            if (currentCell) cells.push(currentCell.trim());
            return cells;
        }

        function formatTableCellContent(cell) {
            if (!cell) return '&nbsp;';
            let formatted = cell
                .replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g,
                    '<code style="font-family: Consolas; background: #f8f8f8; padding: 2px 4px;">$1</code>');
            formatted = formatted.replace(/✅/g, '✅').replace(/⚠️/g, '⚠️').replace(/❌/g, '❌');
            return formatted;
        }

        function generateWordTableHTML(rows) {
            if (rows.length < 2) return '';
            const headerCells = parseTableRow(rows[0]);
            const columnCount = headerCells.length;
            let html =
                `<div style="width: 100%; margin: 0 0 8pt 0;">\n<table style="border-collapse: collapse; width: 100%; border: 1pt solid #888; table-layout: auto;">\n<thead>\n<tr style="background-color: #f2f4f8;">`;
            headerCells.forEach(cell => {
                html +=
                    `<th style="border: 1pt solid #888; padding: 6pt 8pt; font-weight: 600; text-align: left;">${formatTableCellContent(cell)}</th>`;
            });
            html += `</tr>\n</thead>\n<tbody>\n`;
            let dataStart = 1;
            if (rows.length > 1 && rows[1].replace(/[^\-:]/g, '').length > 2) dataStart = 2;
            for (let i = dataStart; i < rows.length; i++) {
                const rowCells = parseTableRow(rows[i]);
                if (rowCells.length === columnCount) {
                    const bgColor = ((i - dataStart) % 2 === 0) ? '#ffffff' : '#fafafc';
                    html += `<tr style="background-color: ${bgColor};">`;
                    rowCells.forEach(cell => {
                        html +=
                            `<td style="border: 1pt solid #888; padding: 5pt 8pt; vertical-align: top;">${formatTableCellContent(cell)}</td>`;
                    });
                    html += `</tr>\n`;
                }
            }
            html += `</tbody>\n</table>\n</div>`;
            return html;
        }

        // ---------- 智能解析：表格用原生生成，其余交给 marked ----------
        function parseMarkdown(text) {
            if (!text.trim()) return `<p>${i18n[currentLang].previewPlaceholder}</p>`;

            const lines = text.split('\n');
            let inCodeBlock = false;
            let tableBuffer = [];
            let placeholders = [];
            let processedLines = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                if (line.trim().startsWith('```')) {
                    inCodeBlock = !inCodeBlock;
                    processedLines.push(line);
                    continue;
                }

                if (!inCodeBlock && line.includes('|') && line.replace(/\|/g, '').trim().length > 0) {
                    if (tableBuffer.length === 0) {
                        tableBuffer.push(line);
                    } else {
                        const prevLine = lines[i - 1];
                        if (prevLine && prevLine.includes('|') && !prevLine.startsWith('```')) {
                            tableBuffer.push(line);
                        } else {
                            if (tableBuffer.length > 0) {
                                const tableHTML = generateWordTableHTML(tableBuffer);
                                const ph = `§§TABLE_PLACEHOLDER_${placeholders.length}§§`;
                                placeholders.push({ ph, html: tableHTML });
                                processedLines.push(ph);
                                tableBuffer = [];
                            }
                            if (line.includes('|') && !line.startsWith('```')) {
                                tableBuffer.push(line);
                            } else {
                                processedLines.push(line);
                            }
                        }
                    }
                } else {
                    if (tableBuffer.length > 0) {
                        const tableHTML = generateWordTableHTML(tableBuffer);
                        const ph = `§§TABLE_PLACEHOLDER_${placeholders.length}§§`;
                        placeholders.push({ ph, html: tableHTML });
                        processedLines.push(ph);
                        tableBuffer = [];
                    }
                    processedLines.push(line);
                }
            }
            if (tableBuffer.length > 0) {
                const tableHTML = generateWordTableHTML(tableBuffer);
                const ph = `§§TABLE_PLACEHOLDER_${placeholders.length}§§`;
                placeholders.push({ ph, html: tableHTML });
                processedLines.push(ph);
            }

            let textWithoutTables = processedLines.join('\n');

            marked.setOptions({
                gfm: true,
                breaks: true,
                pedantic: false,
            });

            let htmlWithPlaceholders = marked.parse(textWithoutTables);

            placeholders.forEach(item => {
                htmlWithPlaceholders = htmlWithPlaceholders.replace(item.ph, item.html);
            });

            return htmlWithPlaceholders;
        }

        // ----------------------------------- 转换 -----------------------------------
        function convertMarkdown() {
            try {
                const input = document.getElementById('markdownInput');
                const preview = document.getElementById('preview');
                if (!input.value.trim()) {
                    showNotification(i18n[currentLang].emptyInput, 'error');
                    return;
                }
                const html = parseMarkdown(input.value);
                preview.innerHTML = html;
                updateStats();
                showNotification(i18n[currentLang].convertSuccess);
            } catch (e) {
                console.error(e);
                showNotification(i18n[currentLang].parseError + e.message, 'error');
            }
        }

        // ----------------------------------- 复制到Word -----------------------------------
        function copyToWord() {
            const preview = document.getElementById('preview');
            if (preview.innerHTML.includes(i18n[currentLang].previewPlaceholder)) {
                showNotification(i18n[currentLang].copyFirst, 'error');
                return;
            }

            const tempDiv = document.createElement('div');
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            tempDiv.style.top = '0';
            tempDiv.style.width = '21cm';
            tempDiv.style.fontFamily = '-apple-system, "Microsoft YaHei", "Segoe UI", Arial, sans-serif';
            tempDiv.style.fontSize = '12pt';
            tempDiv.innerHTML = preview.innerHTML;

            document.body.appendChild(tempDiv);
            const range = document.createRange();
            range.selectNode(tempDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                const successful = document.execCommand('copy');
                selection.removeAllRanges();
                document.body.removeChild(tempDiv);
                if (successful) {
                    showNotification(i18n[currentLang].copySuccess);
                } else {
                    fallbackCopy();
                }
            } catch (err) {
                document.body.removeChild(tempDiv);
                fallbackCopy();
            }
        }

        function fallbackCopy() {
            alert(i18n[currentLang].manualCopy);
        }

        // ----------------------------------- 导出 DOCX（已修正） -----------------------------------
        function exportDocx() {
            const preview = document.getElementById('preview');
            if (!preview || preview.innerHTML.includes(i18n[currentLang].previewPlaceholder)) {
                showNotification(i18n[currentLang].exportFirst, 'error');
                return;
            }

            if (typeof htmlDocx === 'undefined' || typeof htmlDocx.asBlob !== 'function') {
                showNotification(i18n[currentLang].docxLibError, 'error');
                return;
            }
            if (typeof saveAs === 'undefined') {
                showNotification(i18n[currentLang].fileSaveError, 'error');
                return;
            }

            const allStyles = document.querySelector('style').innerHTML;
            let exportStyles = allStyles
                .replace(/#preview\s+/g, '')
                .replace(/#preview>/g, '')
                .replace(/#preview\s*,\s*/g, '')
                .replace(/#preview/g, '');

            exportStyles = exportStyles.replace(/::before\s*\{[^}]*\}/g, '');
            exportStyles = exportStyles.replace(/::marker\s*\{[^}]*\}/g, '');

            const contentHTML = preview.innerHTML;

            const fullHTML = `<!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <style>
                ${exportStyles}
                body {
                    padding: 36pt;
                    margin: 0;
                    background: white;
                    font-family: -apple-system, 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
                    font-size: 12pt;
                    line-height: 1.6;
                }
                ul {
                    list-style-type: disc;
                    padding-left: 2em;
                }
                ol {
                    list-style-type: decimal;
                    padding-left: 2em;
                }
            </style>
        </head>
        <body>
            ${contentHTML}
        </body>
        </html>`;

            try {
                const blob = htmlDocx.asBlob(fullHTML);
                saveAs(blob, 'document.docx');
                showNotification(i18n[currentLang].exportSuccess);
            } catch (e) {
                console.error('DOCX 导出失败:', e);
                showNotification(i18n[currentLang].exportFail + e.message, 'error');
            }
        }

        // ----------------------------------- 清空 -----------------------------------
        function clearAll() {
            if (confirm(i18n[currentLang].clearConfirm)) {
                document.getElementById('markdownInput').value = '';
                document.getElementById('preview').innerHTML = `<p>${i18n[currentLang].previewPlaceholder}</p>`;
                updateStats();
                showNotification(i18n[currentLang].cleared);
            }
        }

        // ----------------------------------- 初始化 -----------------------------------
        document.addEventListener('DOMContentLoaded', function() {
            // 从 localStorage 读取语言偏好，默认为中文
            const savedLang = localStorage.getItem('markdown2docx_lang') || 'zh';
            // 设置默认示例内容为对应语言的版本
            const textarea = document.getElementById('markdownInput');
            textarea.value = i18n[savedLang].defaultMarkdown;

            // 应用语言设置
            setLanguage(savedLang);

            // 监听输入以更新统计
            textarea.addEventListener('input', updateStats);

            // 快捷键 Ctrl+Enter 转换
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    e.preventDefault();
                    convertMarkdown();
                }
            });

            // 初始统计与转换
            updateStats();
            convertMarkdown();
        });
    </script>
</body>
</html>
